<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>TK发私信</title>
<!-- 加到主屏幕后：全屏、无地址栏、像 App -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<meta name="theme-color" content="#0f1115">
<link rel="manifest" href="manifest.webmanifest">

<style>
  :root { --bg:#0f1115; --card:#1a1d24; --line:#2a2e38; --txt:#e8eaed; --sub:#9aa0ab;
          --accent:#ff3b5c; --done:#2e7d32; --donebg:#16240f; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--txt);
              font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif; }
  .wrap { max-width:680px; margin:0 auto;
          padding:calc(14px + env(safe-area-inset-top)) 12px calc(80px + env(safe-area-inset-bottom)); }
  h1 { font-size:18px; margin:6px 2px 2px; }
  .hint { font-size:12.5px; color:var(--sub); margin:0 2px 12px; line-height:1.6; }
  .bar { display:flex; align-items:center; gap:10px; margin:8px 2px 14px; font-size:13px; color:var(--sub); }
  .bar b { color:var(--txt); font-size:15px; }
  .progress { flex:1; height:6px; background:var(--line); border-radius:3px; overflow:hidden; }
  .progress > i { display:block; height:100%; background:var(--accent); width:0%; transition:width .25s; }

  details { background:var(--card); border:1px solid var(--line); border-radius:12px; margin:0 0 14px; }
  summary { padding:12px 14px; font-size:14px; cursor:pointer; color:var(--txt); user-select:none; }
  .panel { padding:0 14px 14px; }
  label.fld { display:block; font-size:12.5px; color:var(--sub); margin:10px 0 5px; }
  textarea { width:100%; min-height:120px; background:#0c0e12; color:var(--txt); border:1px solid var(--line);
             border-radius:10px; padding:10px; font-size:14px; line-height:1.6; resize:vertical;
             font-family:ui-monospace,Menlo,Consolas,monospace; }
  .btn { display:inline-block; background:var(--accent); color:#fff; border:none; border-radius:10px;
         padding:11px 16px; font-size:15px; font-weight:600; cursor:pointer; }
  .btn.ghost { background:transparent; color:var(--sub); border:1px solid var(--line); font-weight:500; }
  .row-btns { display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }

  ul { list-style:none; margin:0; padding:0; }
  li { background:var(--card); border:1px solid var(--line); border-radius:12px; margin:0 0 10px;
       display:flex; align-items:stretch; overflow:hidden; }
  li.done { opacity:.5; }
  li.done .main { text-decoration:line-through; }
  .main { flex:1; padding:13px 14px; cursor:pointer; min-width:0; }
  .uname { font-size:15.5px; font-weight:600; color:var(--accent); word-break:break-all; }
  li.done .uname { color:var(--done); }
  .hs { font-size:13px; color:var(--sub); margin-top:4px; line-height:1.5;
        display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .mark { width:54px; flex:none; border-left:1px solid var(--line); background:transparent;
          color:var(--sub); font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  li.done .mark { color:var(--done); }
  .empty { text-align:center; color:var(--sub); font-size:13.5px; padding:40px 10px; line-height:1.8; }
  .toast { position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px);
           background:#000; color:#fff; padding:10px 18px; border-radius:22px; font-size:14px;
           opacity:0; transition:.2s; pointer-events:none; z-index:9; }
  .toast.show { opacity:.92; transform:translateX(-50%) translateY(0); }
  .opt { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--sub); margin-top:12px; }
  .opt input { width:18px; height:18px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>📨 TK 发私信名单</h1>
  <p class="hint">点客户那一行 → <b style="color:var(--txt)">话术自动复制</b> + 跳到他的 TikTok 主页。<br>
     进 TikTok 后点「发消息」→ 长按粘贴 → 发送。回来点下一个。已发的会划掉，关掉再开也记得。</p>

  <div class="bar">
    <span>已发 <b id="cntDone">0</b> / 共 <b id="cntAll">0</b></span>
    <span class="progress"><i id="bar"></i></span>
  </div>

  <details id="editBox">
    <summary>✏️ 编辑名单 / 设置话术</summary>
    <div class="panel">
      <label class="fld">客户名单（一行一个；格式：<b>用户名 | 话术</b>。不写话术就用下面的通用话术）</label>
      <textarea id="listInput" placeholder="zhang_san | 你好呀，刷到你视频觉得很投缘，想认识一下😊&#10;li_si&#10;wang_wu | 在吗？看你也是台湾的，想交个朋友"></textarea>

      <label class="fld">通用话术（可写多句，每行一句，会轮换着配给没单独写话术的客户）</label>
      <textarea id="hsInput" style="min-height:80px" placeholder="你好呀，刷到你的视频，想认识一下交个朋友😊&#10;嗨，看到你的主页觉得很有缘，打个招呼~"></textarea>

      <div class="opt">
        <input type="checkbox" id="useShortcut">
        <label for="useShortcut" style="margin:0">用「去发私信」快捷指令跳转（装了快捷指令再勾；不勾就直接跳，话术也照样复制）</label>
      </div>

      <div class="row-btns">
        <button class="btn" id="genBtn">保存并生成名单</button>
        <button class="btn ghost" id="resetDone">把"已发"全部清零</button>
      </div>
    </div>
  </details>

  <ul id="list"></ul>
  <div class="empty" id="empty">名单是空的。点上面「✏️ 编辑名单」把客户填进去。</div>
</div>

<div class="toast" id="toast">已复制话术</div>

<script>
// 注册离线缓存：第一次联网开过之后，没网也能打开
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("sw.js").catch(function () {});
  });
}
</script>

<script>
(function () {
  var LS_LIST = "tk_list_raw", LS_HS = "tk_hs_raw", LS_DONE = "tk_done", LS_SC = "tk_use_sc";
  var $ = function (id) { return document.getElementById(id); };
  var customers = [];          // {user, hs}
  var done = {};               // user -> true

  function loadDone() { try { done = JSON.parse(localStorage.getItem(LS_DONE) || "{}"); } catch (e) { done = {}; } }
  function saveDone() { localStorage.setItem(LS_DONE, JSON.stringify(done)); }

  function parseList() {
    var raw = $("listInput").value || "";
    var pool = ($("hsInput").value || "").split(/\r?\n/).map(function (s) { return s.trim(); }).filter(Boolean);
    var out = [], pi = 0;
    raw.split(/\r?\n/).forEach(function (line) {
      line = line.trim();
      if (!line) return;
      var parts = line.split(/\s*[|｜]\s*/);          // 按 | 或 ｜ 拆
      var user = (parts[0] || "").replace(/^@+/, "").trim();
      if (!user) return;
      var hs = parts.length > 1 ? parts.slice(1).join(" | ").trim() : "";
      if (!hs) { hs = pool.length ? pool[pi % pool.length] : ""; pi++; }
      out.push({ user: user, hs: hs });
    });
    return out;
  }

  function render() {
    var ul = $("list"); ul.innerHTML = "";
    $("cntAll").textContent = customers.length;
    var d = 0;
    customers.forEach(function (c) {
      if (done[c.user]) d++;
      var li = document.createElement("li");
      if (done[c.user]) li.className = "done";

      var main = document.createElement("div");
      main.className = "main";
      var u = document.createElement("div"); u.className = "uname"; u.textContent = "@" + c.user;
      var h = document.createElement("div"); h.className = "hs"; h.textContent = c.hs || "（无话术，跳转后自己打字）";
      main.appendChild(u); main.appendChild(h);
      main.onclick = function () { go(c); };

      var mk = document.createElement("div");
      mk.className = "mark"; mk.textContent = done[c.user] ? "✓" : "○";
      mk.title = "标记已发/未发";
      mk.onclick = function (e) { e.stopPropagation(); done[c.user] = !done[c.user]; saveDone(); render(); };

      li.appendChild(main); li.appendChild(mk);
      ul.appendChild(li);
    });
    $("cntDone").textContent = d;
    $("bar").style.width = (customers.length ? (d / customers.length * 100) : 0) + "%";
    $("empty").style.display = customers.length ? "none" : "block";
  }

  function copyText(t) {
    if (!t) return;
    try {
      var ta = document.createElement("textarea");
      ta.value = t; ta.style.position = "fixed"; ta.style.top = "-1000px";
      document.body.appendChild(ta); ta.focus(); ta.select();
      ta.setSelectionRange(0, t.length);
      document.execCommand("copy");                 // 同步复制，紧接着跳转也来得及
      document.body.removeChild(ta);
    } catch (e) {
      if (navigator.clipboard) { navigator.clipboard.writeText(t); }
    }
  }

  function showToast(msg) {
    var t = $("toast"); t.textContent = msg; t.classList.add("show");
    setTimeout(function () { t.classList.remove("show"); }, 1200);
  }

  function go(c) {
    copyText(c.hs);
    done[c.user] = true; saveDone(); render();
    showToast(c.hs ? "已复制话术，正在跳转…" : "正在跳转…");
    var url;
    if ($("useShortcut").checked) {
      var input = encodeURIComponent(c.user + "|" + (c.hs || ""));
      url = "shortcuts://run-shortcut?name=" + encodeURIComponent("去发私信") + "&input=" + input;
    } else {
      url = "https://www.tiktok.com/@" + encodeURIComponent(c.user);
    }
    setTimeout(function () { window.location.href = url; }, 120);
  }

  function generate() {
    customers = parseList();
    localStorage.setItem(LS_LIST, $("listInput").value);
    localStorage.setItem(LS_HS, $("hsInput").value);
    localStorage.setItem(LS_SC, $("useShortcut").checked ? "1" : "0");
    render();
    if (customers.length) { $("editBox").open = false; }
  }

  // 初始化：恢复上次
  loadDone();
  $("listInput").value = localStorage.getItem(LS_LIST) || "";
  $("hsInput").value = localStorage.getItem(LS_HS) || "";
  $("useShortcut").checked = localStorage.getItem(LS_SC) === "1";
  customers = parseList();
  if (!customers.length) { $("editBox").open = true; }
  render();

  $("genBtn").onclick = generate;
  $("resetDone").onclick = function () { done = {}; saveDone(); render(); showToast("已清零"); };
})();
</script>
</body>
</html>
