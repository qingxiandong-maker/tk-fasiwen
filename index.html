<style>
  /* 绿色 Donezo 风（第88会话）：白/浅灰底 + 祖母绿强调 + Inter + 柔和阴影 */
  :root{
    --bg:#f6f7f9; --surface:#ffffff; --fg:#0f172a; --muted:#7b8190; --line:#edeef1;
    --green:#1f7a52; --green-soft:#e8f3ee; --green-line:#bfe0cf;
    --red:#ef4444; --red-soft:#fef2f2; --red-line:#fecaca;
    --shadow:0 1px 2px rgba(16,24,40,.04), 0 2px 8px rgba(16,24,40,.05);
    --r:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    -webkit-font-smoothing:antialiased;}
  .wrap{max-width:720px;margin:0 auto;
    padding:calc(18px + env(safe-area-inset-top)) 14px calc(50px + env(safe-area-inset-bottom));}
  .top{display:flex;align-items:center;justify-content:space-between;}
  h1{font-size:19px;margin:0;font-weight:800;letter-spacing:-.02em;}
  .conn{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;font-weight:500;}
  .dot{width:7px;height:7px;border-radius:50%;background:#a1a1aa;}
  .dot.on{background:#22c55e;} .dot.off{background:var(--red);}
  .hint{font-size:12.5px;color:var(--muted);margin:7px 0 2px;line-height:1.6;}

  /* 卡片 = 可点筛选 */
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(102px,1fr));gap:10px;margin:14px 0;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:13px 14px;
    cursor:pointer;transition:.14s;box-shadow:var(--shadow);}
  .card:hover{transform:translateY(-1px);}
  .card .n{font-size:25px;font-weight:800;line-height:1.05;letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
  .card .l{font-size:11.5px;color:var(--muted);margin-top:4px;font-weight:500;}
  .card.active{background:var(--green);border-color:var(--green);box-shadow:0 4px 14px rgba(31,122,82,.28);}
  .card.active .n,.card.active .l{color:#fff;}
  .card.red .n{color:var(--red);}
  .card.red.active{background:var(--red);border-color:var(--red);box-shadow:0 4px 14px rgba(239,68,68,.25);}
  .card.red.active .n,.card.red.active .l{color:#fff;}

  /* 顶部删除栏（选了可删分类才出现） */
  .ctxbar{display:none;align-items:center;justify-content:space-between;gap:10px;
    background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:11px 14px;margin:0 0 12px;box-shadow:var(--shadow);}
  .ctxbar.show{display:flex;}
  .ctxbar .lbl{font-size:13px;color:var(--fg);font-weight:500;} .ctxbar .lbl b{font-weight:700;}
  .delbig{background:var(--red);color:#fff;border:none;border-radius:9px;padding:9px 15px;font-size:13.5px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .delbig:disabled{opacity:.4;cursor:not-allowed;}

  ul{list-style:none;margin:0;padding:0;}
  li{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);margin:0 0 9px;
    display:flex;align-items:stretch;overflow:hidden;box-shadow:var(--shadow);transition:.12s;}
  li:hover{border-color:#dfe1e6;}
  li.done{opacity:.55;} li.done .main{text-decoration:line-through;}
  .main{flex:1;padding:13px 15px;cursor:pointer;min-width:0;display:block;text-decoration:none;color:inherit;}
  .uname{font-size:15px;font-weight:600;word-break:break-all;display:flex;align-items:center;flex-wrap:wrap;gap:6px;letter-spacing:-.01em;}
  .hs{font-size:12.5px;color:var(--muted);margin-top:5px;line-height:1.5;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .gtag{font-size:10.5px;padding:2px 7px;border-radius:6px;font-weight:700;background:#f1f2f4;color:var(--muted);}
  .gtag.f{background:#fdeaf4;color:#c81e80;} .gtag.m{background:#e8f0fe;color:#2563eb;}
  .tag{font-size:10.5px;padding:2px 7px;border-radius:6px;font-weight:600;}
  .tag.bad{background:var(--red-soft);color:#dc2626;border:1px solid var(--red-line);}
  .tag.warn{background:#fffbeb;color:#b45309;border:1px solid #fde68a;}
  .mark{width:48px;flex:none;border-left:1px solid var(--line);background:transparent;color:#c7ccd4;
    font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  li.done .mark{color:var(--green);}
  .rowdel{width:46px;flex:none;border-left:1px solid var(--line);background:transparent;color:#cdd2da;
    font-size:16px;cursor:pointer;display:none;align-items:center;justify-content:center;}
  body.admin .rowdel{display:flex;}
  .rowdel:hover{background:var(--red-soft);color:var(--red);}
  .empty{text-align:center;color:var(--muted);font-size:13px;padding:30px 10px;line-height:1.8;}

  /* 管理模式 */
  .adminbar{margin-top:20px;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);border-top:1px solid var(--line);padding-top:15px;font-weight:500;}
  .adminbar input{width:17px;height:17px;accent-color:var(--green);}
  .panel{display:none;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-top:10px;box-shadow:var(--shadow);}
  body.admin .panel{display:block;}
  label.fld{display:block;font-size:12px;color:var(--muted);margin:8px 0 5px;font-weight:500;}
  textarea{width:100%;min-height:110px;background:var(--surface);color:var(--fg);border:1px solid var(--line);
    border-radius:10px;padding:10px;font-size:14px;line-height:1.6;resize:vertical;
    font-family:ui-monospace,Menlo,Consolas,monospace;}
  .btn{display:inline-block;background:var(--green);color:#fff;border:none;border-radius:9px;padding:10px 15px;font-size:14px;font-weight:600;cursor:pointer;}
  .btn.ghost{background:var(--surface);color:var(--fg);border:1px solid var(--line);font-weight:500;}
  .btn.danger{background:var(--surface);color:#dc2626;border:1px solid var(--red-line);font-weight:500;}
  .row-btns{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
  .opt{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);margin-top:12px;}
  .opt input{width:17px;height:17px;accent-color:var(--green);}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(16px);
    background:var(--fg);color:#fff;padding:10px 17px;border-radius:22px;font-size:13.5px;
    opacity:0;transition:.2s;pointer-events:none;z-index:9;max-width:88%;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.18);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>

<div class="wrap">
  <div class="top">
    <h1>📨 TK 发私信</h1>
    <span class="conn"><span class="dot" id="dot"></span><span id="connTxt">连接中…</span></span>
  </div>
  <p class="hint">点客户那行 → 话术自动复制 + 跳到他 TikTok 主页。点上面卡片可按分类筛选。<br>
     所有手机实时共用同一份名单和进度，谁发了大家都看到。</p>

  <!-- 卡片：点了就筛 -->
  <div class="cards" id="cards" style="display:none"></div>

  <!-- 顶部删除栏（选了可删分类 + 管理模式 才出现） -->
  <div class="ctxbar" id="ctxbar">
    <span class="lbl" id="ctxlbl"></span>
    <button class="delbig" id="delBig">🗑 删除这 0 个</button>
  </div>

  <ul id="list"></ul>
  <div class="empty" id="empty">还没有名单。请在电脑上开「管理模式」导入。</div>

  <!-- 管理模式：删除 / 导入 / 清空（在电脑上勾开） -->
  <div class="adminbar">
    <input type="checkbox" id="adminToggle">
    <label for="adminToggle" style="margin:0">⚙️ 管理模式（删除 / 导入 / 清空名单，在电脑上开。手机不用开）</label>
  </div>
  <div class="panel">
    <label class="fld">客户名单（一行一个：<b>用户名 | 话术</b> / <b>用户名,话术</b> / 纯用户名）</label>
    <textarea id="listInput" placeholder="zhang_san | 你好呀，刷到你视频想认识一下😊&#10;li_si&#10;wang_meimei,在吗？交个朋友吧"></textarea>
    <label class="fld">通用话术（每行一句，给没写话术的客户轮换用）</label>
    <textarea id="poolInput" style="min-height:64px" placeholder="你好呀，刷到你的视频，想认识一下😊"></textarea>
    <div class="opt">
      <input type="checkbox" id="useShortcut">
      <label for="useShortcut" style="margin:0">用「去发私信」快捷指令跳转（装了再勾）</label>
    </div>
    <div class="row-btns">
      <button class="btn" id="saveBtn">💾 保存并同步到所有手机</button>
      <label class="btn ghost" for="fileInput" style="cursor:pointer">📂 导入文件</label>
      <input type="file" id="fileInput" accept=".txt,.csv,text/plain,text/csv" style="display:none">
      <button class="btn ghost" id="resetSent">把"已发"清零</button>
      <button class="btn danger" id="clearAll">🗑️ 清空全部</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">已复制</div>

<script>
(function () {
  var firebaseConfig = {
    apiKey: "AIzaSyCjZtY6mBbOpl7vTVEUhk66B1JYsTmxGmM",
    authDomain: "tiktok----sx.firebaseapp.com",
    databaseURL: "https://tiktok----sx-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "tiktok----sx",
    storageBucket: "tiktok----sx.firebasestorage.app",
    messagingSenderId: "370281261487",
    appId: "1:370281261487:web:790467ee7971f96c43675a"
  };
  firebase.initializeApp(firebaseConfig);

  firebase.auth().signInAnonymously().catch(function (e) {
    var t = document.getElementById("connTxt"); if (t) t.textContent = "登录失败：" + (e.code || e.message);
  });
  var __started = false;
  firebase.auth().onAuthStateChanged(function (user) {
    if (!user || __started) return; __started = true; start();
  });

  function start() {
  var db = firebase.database();
  var listRef = db.ref("tk/list");
  var poolRef = db.ref("tk/pool");
  var sentRef = db.ref("tk/sent");
  var genderRef = db.ref("tk/gender");
  var filter = "all";   // all|已发|剩余|女|男|num|dup

  var $ = function (id) { return document.getElementById(id); };
  var LS_ADMIN = "tk_admin", LS_SC = "tk_use_sc";

  var state = { listText: "", poolText: "", sent: {}, gender: {} };
  var customers = [], dupSet = {};

  function genderOf(u) { return state.gender[skey(u)] || "?"; }
  function isSent(u) { return !!state.sent[skey(u)]; }
  function isNum(u) { return /^\d+$/.test(u); }

  // 用户名 → Firebase 安全 key（避开 . $ # [ ] / %）
  function skey(u) { return u.replace(/[.$#\[\]\/%]/g, function (c) { return "%" + c.charCodeAt(0).toString(16); }); }

  function parseList() {
    var pool = (state.poolText || "").split(/\r?\n/).map(function (s) { return s.trim(); }).filter(Boolean);
    var out = [], pi = 0;
    (state.listText || "").split(/\r?\n/).forEach(function (line) {
      line = line.trim();
      if (!line || line.charAt(0) === "#") return;
      var parts;
      if (line.indexOf("|") >= 0 || line.indexOf("｜") >= 0) parts = line.split(/\s*[|｜]\s*/);
      else { var m = line.match(/^([^\t,，]+)[\t,，](.+)$/); parts = m ? [m[1], m[2]] : [line]; }
      var user = (parts[0] || "").replace(/^@+/, "").trim();
      if (!user) return;
      var hs = parts.length > 1 ? parts.slice(1).join(" | ").trim() : "";
      if (!hs) { hs = pool.length ? pool[pi % pool.length] : ""; pi++; }
      out.push({ user: user, hs: hs });
    });
    return out;
  }

  function buildUrl(c) {
    if ($("useShortcut").checked) {
      return "shortcuts://run-shortcut?name=" + encodeURIComponent("去发私信") +
             "&input=" + encodeURIComponent(c.user + "|" + (c.hs || ""));
    }
    return "https://www.tiktok.com/@" + encodeURIComponent(c.user);
  }

  function match(c, f) {
    if (f === "all") return true;
    if (f === "已发") return isSent(c.user);
    if (f === "剩余") return !isSent(c.user);
    if (f === "女") return genderOf(c.user) === "女";
    if (f === "男") return genderOf(c.user) === "男";
    if (f === "num") return isNum(c.user);
    if (f === "dup") return !!dupSet[c.user.toLowerCase()] && !isNum(c.user);
    return true;
  }

  // 哪些分类给"批量删除"按钮（全部/已发/剩余 不给，防误删）
  var DELETABLE = { "女":1, "男":1, "num":1, "dup":1 };
  var LABEL = { all:"全部", 已发:"已发", 剩余:"剩余", 女:"♀ 女", 男:"♂ 男", num:"数字ID·跳不了", dup:"重复" };

  function isAdmin() { return document.body.classList.contains("admin"); }

  // 删除一批用户：从 /tk/list 移除其行 + 清掉 已发/性别 记录
  function deleteUsers(users) {
    if (!users.length) return;
    var selSet = {}; users.forEach(function (u) { selSet[u.toLowerCase()] = 1; });
    var kept = (state.listText || "").split(/\r?\n/).filter(function (line) {
      var t = line.trim();
      if (!t || t.charAt(0) === "#") return true;
      var parts;
      if (t.indexOf("|") >= 0 || t.indexOf("｜") >= 0) parts = t.split(/\s*[|｜]\s*/);
      else { var m = t.match(/^([^\t,，]+)[\t,，](.+)$/); parts = m ? [m[1], m[2]] : [t]; }
      var user = (parts[0] || "").replace(/^@+/, "").trim();
      return !selSet[user.toLowerCase()];
    });
    var newText = kept.join("\n");
    listRef.set(newText);
    users.forEach(function (u) { sentRef.child(skey(u)).remove(); genderRef.child(skey(u)).remove(); });
    state.listText = newText;   // 乐观更新：立即重画，Firebase 回推会再确认一次
    if ($("listInput")) $("listInput").value = newText;
  }

  function renderCards() {
    var b = $("cards");
    if (!customers.length) { b.style.display = "none"; b.innerHTML = ""; return; }
    var total = customers.length, done = 0, num = 0, fem = 0, male = 0;
    customers.forEach(function (c) {
      if (isSent(c.user)) done++;
      if (isNum(c.user)) num++;
      var g = genderOf(c.user); if (g === "女") fem++; else if (g === "男") male++;
    });
    var dupN = Object.keys(dupSet).length;
    var defs = [
      { f:"all", n:total, l:"客户总数", cls:"" },
      { f:"已发", n:done, l:"已发", cls:"" },
      { f:"剩余", n:total - done, l:"剩余", cls:"" },
      { f:"女", n:fem, l:"♀ 女", cls:"" },
      { f:"男", n:male, l:"♂ 男", cls:"" },
      { f:"num", n:num, l:"⚠ 数字ID·跳不了", cls:num ? "red" : "" },
      { f:"dup", n:dupN, l:"⚠ 重复", cls:dupN ? "red" : "" }
    ];
    b.style.display = "";
    b.innerHTML = "";
    defs.forEach(function (d) {
      var el = document.createElement("div");
      el.className = "card " + d.cls + (filter === d.f ? " active" : "");
      el.innerHTML = '<div class="n">' + d.n + '</div><div class="l">' + d.l + '</div>';
      el.onclick = function () { filter = (filter === d.f ? "all" : d.f); render(); };
      b.appendChild(el);
    });
  }

  function renderCtx() {
    var bar = $("ctxbar");
    if (filter !== "all" && DELETABLE[filter] && isAdmin() && customers.length) {
      var n = customers.filter(function (c) { return match(c, filter); }).length;
      bar.classList.add("show");
      $("ctxlbl").innerHTML = '正在看 <b>' + LABEL[filter] + '</b>：共 <b>' + n + '</b> 个';
      $("delBig").textContent = "🗑 删除这 " + n + " 个";
      $("delBig").disabled = n === 0;
    } else { bar.classList.remove("show"); }
  }

  function render() {
    customers = parseList();
    // 计算重复集合
    dupSet = {}; var seen = {};
    customers.forEach(function (c) { var k = c.user.toLowerCase(); if (seen[k]) dupSet[k] = 1; seen[k] = 1; });

    renderCards();
    renderCtx();

    var ul = $("list"); ul.innerHTML = "";
    var shown = customers.filter(function (c) { return match(c, filter); });
    shown.forEach(function (c) {
      var sent = isSent(c.user);
      var g = genderOf(c.user);
      var num = isNum(c.user);
      var dup = !!dupSet[c.user.toLowerCase()] && !num;

      var li = document.createElement("li");
      if (sent) li.className = "done";

      var main = document.createElement("a");
      main.className = "main"; main.href = buildUrl(c); main.setAttribute("rel", "noopener");
      var u = document.createElement("div"); u.className = "uname";
      if (g === "女" || g === "男") { var gt = document.createElement("span"); gt.className = "gtag " + (g === "女" ? "f" : "m"); gt.textContent = (g === "女" ? "♀" : "♂"); u.appendChild(gt); }
      u.appendChild(document.createTextNode("@" + c.user));
      if (num) { var tn = document.createElement("span"); tn.className = "tag bad"; tn.textContent = "数字ID跳不了"; u.appendChild(tn); }
      else if (dup) { var td = document.createElement("span"); td.className = "tag warn"; td.textContent = "重复"; u.appendChild(td); }
      var h = document.createElement("div"); h.className = "hs"; h.textContent = c.hs || "（无话术，跳转后自己打字）";
      main.appendChild(u); main.appendChild(h);
      main.onclick = function () {
        copyText(c.hs);
        sentRef.child(skey(c.user)).set(true);   // 共享：标记已发
        // 不拦默认 → 原生跳转
      };

      var mk = document.createElement("div");
      mk.className = "mark"; mk.textContent = sent ? "✓" : "○"; mk.title = "标记已发/未发";
      mk.onclick = function (e) {
        e.stopPropagation();
        if (sent) sentRef.child(skey(c.user)).remove(); else sentRef.child(skey(c.user)).set(true);
      };

      var rd = document.createElement("div");
      rd.className = "rowdel"; rd.textContent = "🗑"; rd.title = "删除这一个";
      rd.onclick = function (e) {
        e.stopPropagation();
        if (!confirm("从名单删除 @" + c.user + "？\n会同时清掉它的已发/性别记录，所有手机一起删。")) return;
        deleteUsers([c.user]); showToast("已删除 @" + c.user); render();
      };

      li.appendChild(main); li.appendChild(mk); li.appendChild(rd);
      ul.appendChild(li);
    });
    $("empty").style.display = customers.length ? "none" : "block";
  }

  function copyText(t) {
    if (!t) return;
    try {
      var ta = document.createElement("textarea");
      ta.value = t; ta.style.position = "fixed"; ta.style.top = "-1000px";
      document.body.appendChild(ta); ta.focus(); ta.select(); ta.setSelectionRange(0, t.length);
      document.execCommand("copy"); document.body.removeChild(ta);
    } catch (e) { if (navigator.clipboard) navigator.clipboard.writeText(t); }
  }
  function showToast(m) { var t = $("toast"); t.textContent = m; t.classList.add("show"); setTimeout(function(){ t.classList.remove("show"); }, 1300); }

  // ── 顶部批量删除 ──
  $("delBig").onclick = function () {
    var del = customers.filter(function (c) { return match(c, filter); }).map(function (c) { return c.user; });
    if (!del.length) return;
    if (!confirm("确定删除「" + LABEL[filter] + "」这 " + del.length + " 个客户？\n会同时清掉他们的已发/性别记录，所有手机一起删，不可撤销。")) return;
    deleteUsers(del); filter = "all"; showToast("已删除 " + del.length + " 个"); render();
  };

  // ── 实时监听（所有手机共享）──
  listRef.on("value", function (s) { state.listText = s.val() || ""; if (isAdmin()) $("listInput").value = state.listText; render(); });
  poolRef.on("value", function (s) { state.poolText = s.val() || ""; if (isAdmin()) $("poolInput").value = state.poolText; render(); });
  sentRef.on("value", function (s) { state.sent = s.val() || {}; render(); });
  genderRef.on("value", function (s) { state.gender = s.val() || {}; render(); });
  db.ref(".info/connected").on("value", function (s) {
    var on = s.val() === true;
    $("dot").className = "dot " + (on ? "on" : "off");
    $("connTxt").textContent = on ? "实时同步中" : "离线（连接中…）";
  });

  // ── 快捷指令开关 ──
  $("useShortcut").checked = localStorage.getItem(LS_SC) === "1";
  $("useShortcut").onchange = function () { localStorage.setItem(LS_SC, this.checked ? "1" : "0"); render(); };

  // ── 管理模式 ──
  function applyAdmin(on) {
    document.body.classList.toggle("admin", on);
    if (on) { $("listInput").value = state.listText; $("poolInput").value = state.poolText; }
    render();
  }
  $("adminToggle").checked = localStorage.getItem(LS_ADMIN) === "1";
  applyAdmin($("adminToggle").checked);
  $("adminToggle").onchange = function () { localStorage.setItem(LS_ADMIN, this.checked ? "1" : "0"); applyAdmin(this.checked); };

  $("saveBtn").onclick = function () {
    listRef.set($("listInput").value || "");
    poolRef.set($("poolInput").value || "");
    showToast("已保存并同步到所有手机");
  };
  $("resetSent").onclick = function () {
    if (!confirm("把所有手机的「已发」进度清零？（名单不动）")) return;
    sentRef.remove(); showToast("已发进度已清零");
  };
  $("clearAll").onclick = function () {
    if (!confirm("清空全部名单 + 进度（所有手机一起空）？此操作不可撤销。")) return;
    listRef.set(""); sentRef.remove(); $("listInput").value = ""; showToast("已清空全部");
  };
  $("fileInput").onchange = function (e) {
    var f = e.target.files && e.target.files[0]; if (!f) return;
    var reader = new FileReader();
    reader.onload = function () {
      var text = String(reader.result || "").replace(/^﻿/, "");
      var added = text.split(/\r?\n/).map(function (ln) {
        ln = ln.trim(); if (!ln) return "";
        if (ln.indexOf("|") >= 0 || ln.indexOf("｜") >= 0) return ln;
        var m = ln.match(/^([^\t,，]+)[\t,，](.+)$/); return m ? (m[1].trim() + " | " + m[2].trim()) : ln;
      }).filter(Boolean);
      if (!added.length) { showToast("文件是空的"); return; }
      var cur = ($("listInput").value || "").trim();
      $("listInput").value = (cur ? cur + "\n" : "") + added.join("\n");
      showToast("已导入 " + added.length + " 条，记得点「保存并同步」");
    };
    reader.readAsText(f, "utf-8"); e.target.value = "";
  };
  } // start()
})();
</script>
</body>
</html>
